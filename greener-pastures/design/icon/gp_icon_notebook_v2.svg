<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgN" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123524"/>
      <stop offset="100%" stop-color="#1e5631"/>
    </linearGradient>
    <linearGradient id="screenN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1512"/>
      <stop offset="100%" stop-color="#10241c"/>
    </linearGradient>
    <linearGradient id="leafN" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ee08a"/>
      <stop offset="100%" stop-color="#2e9e5b"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="128" height="128" rx="20" fill="url(#bgN)"/>

  <!-- Notebook body -->
  <rect x="20" y="24" width="88" height="80" rx="8" fill="#2b2b33" stroke="#454552" stroke-width="2"/>
  <!-- Spiral binding -->
  <g fill="none" stroke="#8a8a99" stroke-width="2.5" stroke-linecap="round">
    <path d="M30 20 L30 30"/>
    <path d="M44 20 L44 30"/>
    <path d="M58 20 L58 30"/>
    <path d="M72 20 L72 30"/>
    <path d="M86 20 L86 30"/>
    <path d="M100 20 L100 30"/>
  </g>

  <!-- Screen -->
  <rect x="27" y="34" width="74" height="62" rx="4" fill="url(#screenN)" stroke="#2e9e5b" stroke-width="1.5"/>

  <!-- Two clean bars -->
  <rect x="33" y="40" width="62" height="9" rx="2.5" fill="#173826"/>
  <rect x="33" y="54" width="44" height="9" rx="2.5" fill="#173826"/>

  <!-- Big leaf growing out of the console -->
  <g>
    <path d="M64 92 C60 78 64 68 78 62 C82 74 78 86 66 92 Z" fill="url(#leafN)" stroke="#1f7a4d" stroke-width="1.5"/>
    <path d="M66 90 C68 80 72 72 77 65" stroke="#1f7a4d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M64 92 C58 82 50 78 42 78 C44 88 52 94 62 93 Z" fill="url(#leafN)" stroke="#1f7a4d" stroke-width="1.5" opacity="0.9"/>
    <path d="M62 91 C56 85 50 81 45 80" stroke="#1f7a4d" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- stem -->
    <path d="M64 96 L64 88" stroke="#1f7a4d" stroke-width="2.5" stroke-linecap="round"/>
  </g>

</svg>
